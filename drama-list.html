<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow">
    <title>戏录列表 | 虞宫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@200;300;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.drama-list-page {
            padding-bottom: 0;
            background:
                linear-gradient(180deg, rgba(197, 160, 89, 0.08), transparent 300px),
                #050505;
        }

        .drama-list-shell {
            width: min(1080px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 96px 0 56px;
        }

        .drama-list-kicker {
            color: var(--yu-gold);
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.24em;
        }

        .drama-list-title {
            color: #f5f0e6;
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(30px, 7vw, 58px);
            line-height: 1.08;
            letter-spacing: 0;
            margin: 12px 0 10px;
        }

        .drama-list-subtitle {
            color: #8d8579;
            line-height: 1.8;
            max-width: 720px;
        }

        .drama-list-toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin: 28px 0 18px;
        }

        .drama-list-search {
            border: 1px solid rgba(197, 160, 89, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: #e8dfd0;
            padding: 13px 14px;
            outline: none;
            width: 100%;
        }

        .drama-list-count {
            border: 1px solid rgba(197, 160, 89, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: var(--yu-gold);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-family: 'Cinzel', serif;
            white-space: nowrap;
        }

        .drama-list-panel {
            border: 1px solid rgba(197, 160, 89, 0.18);
            background: rgba(8, 8, 8, 0.86);
        }

        .drama-list-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px;
            gap: 16px;
            padding: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            color: #cfc7b9;
            transition: background 0.18s ease;
        }

        .drama-list-row:hover {
            background: rgba(197, 160, 89, 0.055);
        }

        .drama-list-row:last-child {
            border-bottom: 0;
        }

        .drama-list-id {
            color: var(--yu-gold);
            font-family: 'Cinzel', serif;
        }

        .drama-list-name {
            color: #f2ebdf;
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            line-height: 1.45;
            letter-spacing: 0;
        }

        .drama-list-meta {
            color: #827a70;
            font-size: 12px;
            line-height: 1.7;
            margin-top: 6px;
        }

        .drama-list-date {
            color: #9d9588;
            font-size: 13px;
            text-align: right;
            line-height: 1.6;
        }

        .drama-list-empty {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8d8579;
            text-align: center;
            line-height: 1.8;
        }

        @media (max-width: 720px) {
            .drama-list-shell {
                width: min(100% - 24px, 1080px);
                padding-top: 84px;
            }

            .drama-list-toolbar {
                grid-template-columns: 1fr;
            }

            .drama-list-count {
                justify-content: center;
                min-height: 42px;
            }

            .drama-list-row {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 16px 14px;
            }

            .drama-list-date {
                text-align: left;
            }
        }
    </style>
</head>

<body class="drama-list-page min-h-screen">
    <header
        class="fixed top-0 w-full z-50 bg-black/95 backdrop-blur-md border-b border-white/5 h-16 flex items-center justify-between px-6">
        <button onclick="location.href='index.html'" class="flex flex-col text-left">
            <h1 class="text-xl md:text-3xl font-bold tracking-[0.2em] text-white gold-glow font-cuyasong">虞宫</h1>
            <span class="text-[0.6rem] text-gray-500 font-roman tracking-widest uppercase">Drama Index</span>
        </button>
        <div class="hidden md:block text-[10px] text-gray-600 font-roman tracking-[0.22em] uppercase">
            Hidden Archive
        </div>
    </header>

    <main class="drama-list-shell">
        <section>
            <div class="drama-list-kicker">YU PALACE DRAMA INDEX</div>
            <h2 class="drama-list-title">戏录列表</h2>
            <p class="drama-list-subtitle">这里只展示已公开查询的戏录编号、标题、剧情日期、参与角色与备注，不展示记录人。</p>
        </section>

        <section class="drama-list-toolbar">
            <input id="drama-search" class="drama-list-search" type="search" placeholder="搜索编号 / 标题 / 日期 / 参与角色 / 备注">
            <div id="drama-count" class="drama-list-count">0 RECORDS</div>
        </section>

        <section id="drama-list" class="drama-list-panel">
            <div class="drama-list-empty">
                <div>
                    <i class="fas fa-circle-notch fa-spin text-yu-gold mb-4 text-xl"></i>
                    <p>正在调取戏录列表...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const listEl = document.getElementById("drama-list");
        const countEl = document.getElementById("drama-count");
        const searchEl = document.getElementById("drama-search");
        let records = [];

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, (m) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[m]));
        }

        function detailHref(row) {
            if (!row.sig) return "#";
            return `drama.html?id=${encodeURIComponent(row.id)}&sig=${encodeURIComponent(row.sig)}`;
        }

        function render(list) {
            countEl.textContent = `${list.length} RECORDS`;
            if (!list.length) {
                listEl.innerHTML = `<div class="drama-list-empty"><p>没有匹配戏录。</p></div>`;
                return;
            }
            listEl.innerHTML = list.map((row) => {
                const meta = [
                    row.participants ? `参与：${row.participants}` : "",
                    row.note ? `备注：${row.note}` : ""
                ].filter(Boolean).join(" ｜ ");
                const href = detailHref(row);
                const title = escapeHtml(row.title || `戏录-${row.id}`);
                return `
                    <a class="drama-list-row" href="${href}">
                        <div class="drama-list-id">#${escapeHtml(row.id)}</div>
                        <div>
                            <div class="drama-list-name">${title}</div>
                            <div class="drama-list-meta">${escapeHtml(meta)}</div>
                        </div>
                        <div class="drama-list-date">${escapeHtml(row.date_str || "-")}</div>
                    </a>
                `;
            }).join("");
        }

        function applySearch() {
            const keyword = searchEl.value.trim().toLowerCase();
            if (!keyword) {
                render(records);
                return;
            }
            render(records.filter((row) => [
                row.id,
                row.title,
                row.date_str,
                row.participants,
                row.note
            ].some((value) => String(value || "").toLowerCase().includes(keyword))));
        }

        async function loadDramaList() {
            try {
                const res = await fetch("/api/drama-list");
                const data = await res.json();
                if (!res.ok || data.error) {
                    listEl.innerHTML = `<div class="drama-list-empty"><p>${escapeHtml(data.detail || data.error || "戏录列表读取失败。")}</p></div>`;
                    return;
                }
                records = Array.isArray(data.records) ? data.records : [];
                render(records);
            } catch (error) {
                listEl.innerHTML = `<div class="drama-list-empty"><p>服务器暂不可达：${escapeHtml(error.message)}</p></div>`;
            }
        }

        searchEl.addEventListener("input", applySearch);
        loadDramaList();
    </script>
</body>

</html>
